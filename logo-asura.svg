<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    ╔═══════════════════════════════════════╗
    ║  ASURA — Capybara Moon Logo           ║
    ║  Estudio argentino de videojuegos     ║
    ╚═══════════════════════════════════════╝
    
    Composición: Silueta de carpincho en perfil 
    mirando a la izquierda contra un círculo (luna).
    Inspirado en logos icónicos de gaming.
  -->
  <defs>
    <clipPath id="c">
      <circle cx="256" cy="256" r="200"/>
    </clipPath>
  </defs>
  
  <!-- Moon -->
  <circle cx="256" cy="256" r="200" fill="#e8e4df"/>
  
  <g clip-path="url(#c)">
    <!-- 
      Carpincho silhouette — profile facing left
      Key features: flat-topped head, small round ears,
      wide blunt rectangular snout, stocky neck
    -->
    <path fill="#1a1a2e" d="
      M 310 520
      C 310 480, 308 450, 300 425
      C 292 400, 280 382, 264 368
      C 248 354, 234 342, 222 330
      C 210 318, 202 306, 198 292
      L 198 280
      C 198 280, 200 275, 204 270
      C 210 262, 218 256, 226 252
      C 238 246, 250 244, 262 244
      C 278 244, 292 250, 302 260
      C 312 270, 318 284, 320 302
      C 322 320, 322 342, 318 368
      C 314 394, 312 424, 312 460
      L 312 520
      Z
    "/>
    
    <!-- Head - boxy shape characteristic of capybara -->
    <path fill="#1a1a2e" d="
      M 130 300
      L 130 242
      C 130 226, 136 212, 148 202
      C 160 192, 174 188, 190 188
      L 240 188
      C 256 188, 268 192, 278 200
      C 288 208, 294 220, 296 236
      L 296 280
      C 296 296, 290 308, 278 316
      C 266 324, 250 328, 232 328
      L 168 328
      C 150 328, 138 320, 130 308
      Z
    "/>
    
    <!-- Snout - wide, blunt, extending left -->
    <path fill="#1a1a2e" d="
      M 90 280
      C 86 264, 88 250, 96 238
      C 104 228, 116 222, 130 220
      L 165 220
      L 165 300
      L 130 300
      C 112 300, 98 294, 90 280
      Z
    "/>
    
    <!-- Nose bump on snout -->
    <path fill="#1a1a2e" d="
      M 82 260
      C 78 250, 78 240, 82 232
      C 86 226, 92 222, 100 222
      C 106 222, 110 226, 112 232
      C 114 240, 114 250, 110 258
      C 106 264, 100 266, 94 264
      Z
    "/>
    
    <!-- Eye (negative space) -->
    <ellipse cx="230" cy="252" rx="12" ry="14" fill="#e8e4df"/>
    <!-- Pupil -->
    <ellipse cx="226" cy="254" rx="5" ry="7" fill="#1a1a2e"/>
    
    <!-- Nostril (negative space) -->
    <ellipse cx="96" cy="248" rx="4" ry="5" fill="#e8e4df"/>
    
    <!-- Mouth line hint -->
    <path fill="none" stroke="#e8e4df" stroke-width="2" stroke-linecap="round" d="
      M 100 268 C 110 272, 125 274, 140 272
    "/>
  </g>
  
  <!-- Ears - extending ABOVE the moon circle for that iconic break -->
  <!-- Left ear (small, rounded) -->
  <ellipse cx="200" cy="174" rx="18" ry="24" fill="#1a1a2e" transform="rotate(-10, 200, 174)"/>
  <!-- Right ear -->
  <ellipse cx="248" cy="170" rx="18" ry="24" fill="#1a1a2e" transform="rotate(5, 248, 170)"/>
  
  <!-- Inner ear detail (subtle) -->
  <ellipse cx="200" cy="172" rx="8" ry="12" fill="#2a2a3e" transform="rotate(-10, 200, 172)"/>
  <ellipse cx="248" cy="168" rx="8" ry="12" fill="#2a2a3e" transform="rotate(5, 248, 168)"/>
</svg>
